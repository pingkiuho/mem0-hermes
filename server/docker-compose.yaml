name: mem0

services:
  # ── mem0 API (FastAPI + pgvector) ──────────────────────
  mem0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mem0-api
    restart: unless-stopped
    ports:
      - "${MEM0_API_PORT:-9000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:9001}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9001}
      - APP_DB_NAME=${APP_DB_NAME:-mem0_app}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # macOS: container → host Ollama
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - mem0_network
    volumes:
      - ~/.mem0-volume/history:/app/history
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Postgres + pgvector ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mem0-postgres
    restart: unless-stopped
    shm_size: "128mb"
    networks:
      - mem0_network
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d postgres -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ~/.mem0-volume/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_HOST_PORT:-9432}:5432"

  # ── Dashboard (Next.js) ───────────────────────────────
  mem0-dashboard:
    build: ./dashboard
    container_name: mem0-dashboard
    restart: unless-stopped
    ports:
      - "${MEM0_DASHBOARD_PORT:-9001}:3000"
    networks:
      - mem0_network
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:9000}
      - API_INTERNAL_URL=http://mem0-api:8000
      - NEXT_PUBLIC_INSTANCE_NAME=Mem0
    depends_on:
      mem0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  mem0_network:
    driver: bridge
